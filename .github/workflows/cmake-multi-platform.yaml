name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libtbb-dev ninja-build build-essential

    - name: Setup vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg.exe install argparse:x64-windows-static
        else
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg install argparse
        fi

    - name: Configure CMake
      shell: bash
      run: |
        # Use quotes around the path to prevent backslash issues on Windows
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=${{ runner.os == 'Windows' && 'x64-windows-static' || 'x64-linux' }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-binaries
        # This tells GitHub to hunt through the entire build folder
        path: |
          build/**/fuzzy-ctph
          build/**/fuzzy-ctph.exe
        # This is the "Truth Serum": if the files aren't found, the build fails
        if-no-files-found: error
        
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for the 403 error
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # The asterisk (*) helps find the files regardless of the middle folder name
          files: |
            release-files/**/*.exe
            release-files/**/fuzzy-ctph
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}