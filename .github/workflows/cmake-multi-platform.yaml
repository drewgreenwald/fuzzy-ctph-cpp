name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libtbb-dev ninja-build build-essential

    - name: Setup vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg.exe install argparse:x64-windows-static
        else
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg install argparse
        fi

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=${{ runner.os == 'Windows' && 'x64-windows-static' || 'x64-linux' }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    # ------------------------------------------------------------------
    # Collect all outputs into a flat staging directory so upload-artifact
    # doesn't have to glob through deep multi-config subdirectories.
    # ------------------------------------------------------------------
    - name: Stage artifacts (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p staging
        # CLI
        cp build/fuzzy-ctph             staging/fuzzy-ctph-linux
        # Static library
        cp build/libctph.a              staging/libctph.a
        # Shared library (versioned symlink target)
        cp build/libctph.so.1.0.0       staging/libctph.so.1.0.0
        # Also copy the unversioned .so for convenience
        cp -P build/libctph.so          staging/libctph.so || true

    - name: Stage artifacts (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path staging | Out-Null
        $cfg = "${{ matrix.build_type }}"
        # CMake multi-config generators (MSVC) put outputs in build/<Config>/
        # Single-config generators (Ninja) put them directly in build/
        $dirs = @("build\$cfg", "build")
        foreach ($d in $dirs) {
          # CLI
          if (Test-Path "$d\fuzzy-ctph.exe") { Copy-Item "$d\fuzzy-ctph.exe" staging\ }
          # Static import lib
          if (Test-Path "$d\ctph.lib")       { Copy-Item "$d\ctph.lib"       staging\ }
          # DLL
          if (Test-Path "$d\ctph.dll")       { Copy-Item "$d\ctph.dll"       staging\ }
        }

    - name: Upload staged artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-binaries
        path: staging/
        if-no-files-found: error

  # -------------------------------------------------------------------------
  # Release job: runs only on version tags; downloads all platform artifacts
  # and attaches them to a GitHub Release.
  # -------------------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files

      # Flatten and rename so the release page is easy to navigate
      - name: Prepare release assets
        run: |
          mkdir -p assets

          # Windows
          src="release-files/windows-latest-binaries"
          [ -f "$src/fuzzy-ctph.exe" ] && cp "$src/fuzzy-ctph.exe" assets/fuzzy-ctph-windows-x64.exe
          [ -f "$src/ctph.lib"       ] && cp "$src/ctph.lib"        assets/ctph-windows-x64-static.lib
          [ -f "$src/ctph.dll"       ] && cp "$src/ctph.dll"        assets/ctph-windows-x64.dll

          # Linux
          src="release-files/ubuntu-latest-binaries"
          [ -f "$src/fuzzy-ctph-linux"    ] && cp "$src/fuzzy-ctph-linux"    assets/fuzzy-ctph-linux-x64
          [ -f "$src/libctph.a"           ] && cp "$src/libctph.a"           assets/libctph-linux-x64.a
          [ -f "$src/libctph.so.1.0.0"    ] && cp "$src/libctph.so.1.0.0"    assets/libctph-linux-x64.so.1.0.0
          [ -f "$src/libctph.so"          ] && cp "$src/libctph.so"          assets/libctph-linux-x64.so || true

          echo "=== Release assets ==="
          ls -lh assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
