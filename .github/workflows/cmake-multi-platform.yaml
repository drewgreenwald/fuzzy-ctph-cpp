name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libtbb-dev ninja-build

    - name: Clone vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        # Use the correct bootstrap for the OS
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          ./vcpkg/bootstrap-vcpkg.bat
        else
          ./vcpkg/bootstrap-vcpkg.sh
        fi

    - name: Install dependencies (Manifest Mode)
      shell: bash
      run: |
        # Just run install without package names. 
        # vcpkg sees vcpkg.json and does the rest.
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          ./vcpkg/vcpkg.exe install --triplet x64-windows
        else
          ./vcpkg/vcpkg install --triplet x64-linux
        fi

    - name: Configure CMake
      run: >
        cmake -B build -S .
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-binaries
        path: |
          build/fuzzy-ctph
          build/Release/fuzzy-ctph.exe
        if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release-files/fuzzy-ctph.exe
            ./release-files/fuzzy-ctph
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}